<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* styles here... */
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="dot"></div>
      <h1>Travel Agent</h1>
    </div>
    <div class="chat-window" id="chatWindow">
      <div class="bubble agent">
        Hi! I am Travel Agent. How can I help you with your travel plans today?
        <div class="timestamp">now</div>
      </div>
    </div>
    <div class="spinner" id="spinner">Agent is thinking...</div>
    <div class="input-row">
      <textarea id="userInput" placeholder="Type a message... (Enter to send)"></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    // Configure marked: safe defaults
    marked.setOptions({
      breaks: true,      // single newline → <br> (friendlier for chat)
      gfm: true,         // GitHub Flavoured Markdown (tables, strikethrough, etc.)
    });

    const chatWindow = document.getElementById('chatWindow');
    const textarea   = document.getElementById('userInput');
    const sendBtn    = document.getElementById('sendBtn');
    const spinner    = document.getElementById('spinner');

    function addBubble(text, role) {
      const div = document.createElement('div');
      div.className = `bubble ${role}`;

      if (role === 'agent') {
        // Render markdown for agent replies
        div.innerHTML = marked.parse(text || '');
      } else {
        // Plain text for user messages (XSS-safe)
        div.textContent = text;
      }

      const ts = document.createElement('div');
      ts.className = 'timestamp';
      ts.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      div.appendChild(ts);

      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function addError(msg) {
      const div = document.createElement('div');
      div.className = 'error-msg';
      div.textContent = '⚠ ' + msg;
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMessage() {
      const text = textarea.value.trim();
      if (!text) return;

      addBubble(text, 'user');
      textarea.value = '';
      textarea.style.height = '44px';
      sendBtn.disabled = true;
      spinner.classList.add('visible');

      try {
        const res = await fetch('http://127.0.0.1:8000/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_input: text, thread_id: 'thread-1' })
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        addBubble(data.assistant_reply || '(no reply)', 'agent');
      } catch (err) {
        addError(err.message || 'Could not reach the agent.');
      } finally {
        sendBtn.disabled = false;
        spinner.classList.remove('visible');
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    textarea.addEventListener('input', () => {
      textarea.style.height = '44px';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
